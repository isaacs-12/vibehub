[package]
name = "vibestudio"
version = "0.2.1"
description = "VibeStudio — spec-first desktop editor"
authors = ["VibeHub"]
edition = "2021"

[lib]
name = "vibestudio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
tauri = { version = "2.0.0", features = [] }
tauri-plugin-dialog = "2.0.0"
tauri-plugin-shell = "2.0.0"
tauri-plugin-deep-link = "2.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
walkdir = "2"
git2 = { version = "0.19", default-features = false, features = ["vendored-libgit2", "vendored-openssl"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
open = "5"

[profile.dev]
debug = 1          # line tables only (not full DWARF) — ~50% smaller debug builds
incremental = true # recompile only changed crates
